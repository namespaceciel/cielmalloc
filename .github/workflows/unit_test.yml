name: unit_test

on:
  push:
    branches:
      - main

jobs:
  job:
    strategy:
      matrix:
        platform:
          - { os: ubuntu-latest, arch: x64 }
          - { os: ubuntu-latest, arch: arm64 }
          - { os: macos-latest, arch: x64 }
          - { os: macos-latest, arch: arm64 }
      fail-fast: true

    name: unit_test on ${{ matrix.platform.os }}-${{ matrix.platform.arch }}
    runs-on: ${{ matrix.platform.os }}-${{ matrix.platform.arch }}

    steps:
      - uses: actions/checkout@v4

      - name: setup
        if: matrix.platform.os == 'macos'
        run: |
          xcode-select --install || true
          brew update

      - name: build test against clang
        run: |
            clang --version
            sudo apt-get install libc++-dev
            make clang_test_build

      - name: build test against gcc
        run: |
            gcc --version
            make gcc_test_build

      - name: test against clang
        run: |
            clang --version
            make clang_test_run

      - name: test against gcc
        run: |
            gcc --version
            make gcc_test_run
