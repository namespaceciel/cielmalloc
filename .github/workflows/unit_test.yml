name: unit_test

on:
  push:
    branches:
      - main

jobs:
  job:
    strategy:
      matrix:
        platform:
          - { os: ubuntu-latest, arch: x64 }
          - { os: ubuntu-latest, arch: arm64 }
          - { os: macos-latest, arch: x64 }
          - { os: macos-latest, arch: arm64 }
      fail-fast: false

    name: unit_test on ${{ matrix.platform.os }}-${{ matrix.platform.arch }}
    runs-on: ${{ matrix.platform.os }}-${{ matrix.platform.arch }}

    steps:
      - uses: actions/checkout@v4

      - name: setup
        if: matrix.platform.os == 'macos'
        run: |
          xcode-select --install || true
          brew update

      - name: build and test
        run: |
            make test
